<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vendre vos collections | Le Coin Geek</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">LE COIN GEEK</a>
        <div class="nav-links">
            <a href="pokemon.html">Pokémon</a>
            <a href="magic.html">Magic</a>
            <a href="lorcana.html">Lorcana</a>
            <a href="rachat.html">Vendre mes cartes</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Vendez vos cartes au meilleur prix</h2>
        <p>Recevez une offre en cash ou crédit magasin pour vos lots de cartes.</p>
        <form>
            <label>Jeu concerné :</label>
            <select>
                <option>Pokémon</option>
                <option>Magic: The Gathering</option>
                <option>Disney Lorcana</option>
            </select>

            <label>Description du lot (État, raretés...) :</label>
            <textarea rows="5" placeholder="Ex: 500 cartes communes, 10 GX, 2 Enchanted..."></textarea>

            <label>Votre courriel :</label>
            <input type="email" placeholder="nom@exemple.com">

            <button type="submit" class="btn-buy" style="border-color: var(--secondary-pink); color: var(--secondary-pink);">Envoyer ma demande</button>
        </form>
    </div>
</body>
</html>
