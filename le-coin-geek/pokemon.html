<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pokémon | Le Coin Geek</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar">🇨🇦 LIVRAISON GRATUITE AU CANADA DÈS 125$ 🍁</div>
    
    <nav>
        <a href="index.html" class="nav-logo">
            <svg width="40" height="40" viewBox="0 0 100 100">
                <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="#00f2ff" stroke-width="4"/>
                <rect x="35" y="30" width="30" height="40" rx="3" fill="none" stroke="#ff00e5" stroke-width="3"/>
                <path d="M50 75 L48 78 L45 77 L47 80 L44 82 L48 82 L50 85 L52 82 L56 82 L53 80 L55 77 L52 78 Z" fill="#d21034"/>
            </svg>
            <span>LE COIN GEEK</span>
        </a>
        <div class="nav-links">
            <a href="pokemon.html">Pokémon</a>
            <a href="magic.html">Magic</a>
            <a href="lorcana.html">Lorcana</a>
            <div onclick="toggleCart()" style="cursor:pointer; margin-left:20px; color:var(--primary-cyan)">🛒 (<span id="cart-count">0</span>)</div>
        </div>
    </nav>

    <div class="product-grid">
        <!-- Ton produit SVB.png -->
        <div class="card">
            <img src="images/SVB.png" alt="Booster Box Scarlet & Violet">
            <div class="card-content">
                <h3 data-name="Booster Box SVB">Scarlet & Violet Booster Box</h3>
                <p class="price">399.99 </span>$ CAD + taxes</p>
                <button class="btn-buy">Ajouter au panier</button>
            </div>
        </div>
        <!-- Ton produit SVB.png -->
        <div class="card">
            <img src="images/paradox.png" alt="Booster Pack Paradox Rift">
            <div class="card-content">
                <h3 data-name="Booster Pack Paradox Rift">Booster Pack Paradox Rift</h3>
                <p class="price">11.99 </span>$ CAD + taxes</p>
                <button class="btn-buy">Ajouter au panier</button>
            </div>
        </div>
        <!-- Ton produit SVB.png -->
        <div class="card">
            <img src="images/PaldeanFatesETB.png" alt="Elite Trainer Box Paldean Fates">
            <div class="card-content">
                <h3 data-name="ETB Paldean Fates">ETB Paldean Fates</h3>
                <p class="price">695.00 </span>$ CAD + taxes</p>
                <button class="btn-buy">Ajouter au panier</button>
            </div>
        </div>
    </div>
    

    <!-- Panier Coulissant -->
    <div id="cart-overlay" onclick="toggleCart()"></div>
    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>Panier</h3>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <p>Total: <span id="total-price">0.00</span>$ CAD</p>
            <button class="btn-buy" style="width:100%">Passer à la caisse</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
